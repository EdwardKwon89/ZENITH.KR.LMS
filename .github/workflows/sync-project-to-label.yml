name: "[Sync] Project Status → Issue Label"

# GitHub Project V2 Status가 보드에서 수동 변경될 때
# 연결된 Issue 레이블을 자동 동기화합니다.
#
# Project Status → 레이블 1:1 매핑
#   Open        → status:open
#   In progress → status:in-progress
#   Review      → status:review
#   Rework      → status:rework
#   Blocked     → status:blocked
#   Done        → status:done
#
# 트리거: projects_v2_item edited (조직 프로젝트)
#         workflow_dispatch        (수동 전체 동기화 — 개인 프로젝트 보완)
#
# 필수 Secret: GH_PROJECT_TOKEN (project + repo 권한 PAT)

on:
  # 조직 프로젝트: 보드에서 Status 변경 시 실시간 트리거
  projects_v2_item:
    types: [edited]

  # 개인 프로젝트 보완 / 수동 전체 재동기화
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (변경 없이 미스매치만 출력)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  issues: write

env:
  PROJECT_ID:      PVT_kwHOD7GZQs4BbEyd
  STATUS_FIELD_ID: PVTSSF_lAHOD7GZQs4BbEydzhV35VU
  REPO:            EdwardKwon89/ZENITH.KR.LMS
  STATUS_LABELS:   "status:open status:in-progress status:review status:rework status:blocked status:done"

jobs:
  # ── Job A: 단일 아이템 실시간 동기화 (projects_v2_item 이벤트) ──────
  sync-single:
    name: Project Status → Issue Label (single)
    runs-on: ubuntu-latest
    if: github.event_name == 'projects_v2_item'

    steps:
      - name: Extract changed status and update issue label
        env:
          GH_TOKEN:    ${{ secrets.GH_PROJECT_TOKEN }}
          ITEM_NODE_ID: ${{ github.event.projects_v2_item.node_id }}
        run: |
          # Status 필드 변경인지 확인
          FIELD_ID=$(echo '${{ toJson(github.event.changes) }}' | \
            python3 -c "import json,sys; c=json.load(sys.stdin); print(c.get('field_value',{}).get('field_node_id',''))" 2>/dev/null || true)

          if [ "$FIELD_ID" != "$STATUS_FIELD_ID" ]; then
            echo "Status 필드 변경 아님 — skip"
            exit 0
          fi

          # 아이템에 연결된 Issue 번호와 현재 Status 조회
          RESULT=$(gh api graphql -f query='
            query($item: ID!) {
              node(id: $item) {
                ... on ProjectV2Item {
                  fieldValues(first: 20) {
                    nodes {
                      ... on ProjectV2ItemFieldSingleSelectValue {
                        name
                        field { ... on ProjectV2SingleSelectField { id } }
                      }
                    }
                  }
                  content { ... on Issue { number } }
                }
              }
            }' -f item="$ITEM_NODE_ID" \
            --jq '{issue: .data.node.content.number, status: (.data.node.fieldValues.nodes[] | select(.field.id == env.STATUS_FIELD_ID) | .name)}' \
            2>/dev/null || true)

          ISSUE_NUMBER=$(echo "$RESULT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('issue',''))" 2>/dev/null || true)
          NEW_STATUS=$(echo "$RESULT"   | python3 -c "import json,sys; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || true)

          if [ -z "$ISSUE_NUMBER" ] || [ -z "$NEW_STATUS" ]; then
            echo "Issue 번호 또는 Status 확인 불가 — skip"
            exit 0
          fi

          # Status → Label 매핑
          case "$NEW_STATUS" in
            "Open")        NEW_LABEL="status:open" ;;
            "In progress") NEW_LABEL="status:in-progress" ;;
            "Review")      NEW_LABEL="status:review" ;;
            "Rework")      NEW_LABEL="status:rework" ;;
            "Blocked")     NEW_LABEL="status:blocked" ;;
            "Done")        NEW_LABEL="status:done" ;;
            *) echo "알 수 없는 Status: $NEW_STATUS — skip"; exit 0 ;;
          esac

          # 기존 status:* 레이블 전체 제거 후 신규 레이블 추가
          CURRENT_LABELS=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels \
            --jq '[.labels[].name | select(startswith("status:"))] | join(",")' 2>/dev/null || true)

          if [ -n "$CURRENT_LABELS" ]; then
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --remove-label "$CURRENT_LABELS" 2>/dev/null || true
          fi
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "$NEW_LABEL"

          echo "✅ Issue #$ISSUE_NUMBER → Label: $NEW_LABEL (Project Status: $NEW_STATUS)"

  # ── Job B: 전체 재동기화 (workflow_dispatch) ──────────────────────
  sync-all:
    name: Project Status → Issue Label (full resync)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Full resync — project status → issue labels
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          DRY_RUN:  ${{ github.event.inputs.dry_run }}
        run: |
          python3 - <<'PYEOF'
          import subprocess, json, os, sys

          REPO            = os.environ['REPO']
          PROJECT_ID      = os.environ['PROJECT_ID']
          STATUS_FIELD_ID = os.environ['STATUS_FIELD_ID']
          DRY_RUN         = os.environ['DRY_RUN'] == 'true'

          STATUS_TO_LABEL = {
            'Open':        'status:open',
            'In progress': 'status:in-progress',
            'Review':      'status:review',
            'Rework':      'status:rework',
            'Blocked':     'status:blocked',
            'Done':        'status:done',
          }

          def gql(query, **vars):
              cmd = ['gh', 'api', 'graphql', '-f', f'query={query}']
              for k, v in vars.items():
                  cmd += ['-f', f'{k}={v}']
              r = subprocess.run(cmd, capture_output=True, text=True)
              return json.loads(r.stdout)

          def gh_cli(*args):
              return subprocess.run(['gh'] + list(args), capture_output=True, text=True)

          # 전체 프로젝트 아이템 조회
          data = gql('''
            query($proj: ID!) {
              node(id: $proj) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field { ... on ProjectV2SingleSelectField { id } }
                          }
                        }
                      }
                      content {
                        ... on Issue {
                          number
                          labels(first: 20) { nodes { name } }
                        }
                      }
                    }
                  }
                }
              }
            }''', proj=PROJECT_ID)

          items = data['data']['node']['items']['nodes']
          updated = skipped = mismatch = 0

          for item in items:
              content = item.get('content', {})
              issue_num = content.get('number')
              if not issue_num:
                  continue

              # 현재 Project Status
              proj_status = next(
                  (f['name'] for f in item['fieldValues']['nodes']
                   if f.get('field', {}).get('id') == STATUS_FIELD_ID),
                  None
              )
              if proj_status not in STATUS_TO_LABEL:
                  skipped += 1
                  continue

              target_label = STATUS_TO_LABEL[proj_status]
              current_labels = [l['name'] for l in content.get('labels', {}).get('nodes', [])]
              status_labels  = [l for l in current_labels if l.startswith('status:')]

              if status_labels == [target_label]:
                  continue  # 이미 일치

              mismatch += 1
              print(f"{'[DRY]' if DRY_RUN else '[UPDATE]'} Issue #{issue_num}: {status_labels} → [{target_label}]  (Project: {proj_status})")

              if not DRY_RUN:
                  if status_labels:
                      gh_cli('issue', 'edit', str(issue_num), '--repo', REPO,
                             '--remove-label', ','.join(status_labels))
                  gh_cli('issue', 'edit', str(issue_num), '--repo', REPO,
                         '--add-label', target_label)
                  updated += 1

          print(f"\n{'Dry run' if DRY_RUN else 'Done'}: {mismatch} mismatch(es) found, {updated} updated, {skipped} skipped (no status)")
          PYEOF
