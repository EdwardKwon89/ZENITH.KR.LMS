name: "[Sync] GitHub Issues → ACTIVE_TASK.md"

# Issue #86 Phase 2
# Issue 생성/라벨변경/종료/재오픈/담당자변경 시 .agent/ACTIVE_TASK.md 상단의
# "GitHub Issues 현황(자동 동기화)" 섹션을 최신 오픈 이슈 목록으로 재생성합니다.
# 팀별 상세 Task 표(수기 관리)는 건드리지 않습니다 — 대상은 GH_ISSUES_SYNC 마커 사이 블록뿐입니다.
#
# 2026-07-07 개정 (Edward 지시 — 방안 B): develop에 branch protection(Required status
# check "Regression Tests")이 적용되어 기본 GITHUB_TOKEN(신원=github-actions[bot], admin
# 아님)의 직접 push가 GH006으로 거부됨. 관리자 PAT 우회나 봇 자체 병합 대신, 이 봇은
# PR만 생성하고 병합은 Aiden이 검토 후 수동으로 진행한다. 우회 경로·자동 병합 권한
# 모두 만들지 않는다. 열려있는 봇 PR이 있으면 새로 만들지 않고 같은 브랜치를 갱신한다.
#
# 2026-07-07 추가 수정 (Edward 명시 승인): repo 기본 설정("Allow GitHub Actions to
# create and approve pull requests")이 꺼져 있어 GITHUB_TOKEN으로는 `gh pr create`
# 자체가 거부됨(GraphQL: not permitted to create or approve pull requests).
# repo 전역 설정을 여는 대신(승인 권한까지 함께 열리는 더 넓은 변경이라 배제),
# PR 생성 단계의 GH_TOKEN만 GH_PROJECT_TOKEN(Admin PAT)으로 교체 — "생성"만
# 가능해지며, 병합은 여전히 Aiden이 CI 통과 확인 후 수동 진행하므로 체크 우회는
# 발생하지 않음.

on:
  issues:
    types: [opened, edited, labeled, unlabeled, assigned, unassigned, closed, reopened]
  workflow_dispatch: {}

permissions:
  contents: write
  issues: read
  pull-requests: write

# 2026-07-20 개정 (Aiden — Team B CI 지연 원인 조사): 라벨 변경이 몰릴 때 이전 실행이
# 끝날 때까지 순차 대기(false)하면 러너를 계속 점유해 다른 PR의 CI를 밀어냄. 이 워크플로우는
# "최신 이슈 상태 반영"만 목적이라 중간 실행 결과는 의미 없음 — 취소 후 최신 트리거만 실행.
concurrency:
  group: sync-active-task-md
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Prepare bot branch, regenerate, and open/update PR (no auto-merge)
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="bot/sync-active-task"
          REPO="${{ github.repository }}"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git rebase origin/develop || { git rebase --abort; git reset --hard origin/develop; }
          else
            git checkout -b "$BRANCH"
          fi

          python3 .github/scripts/sync_active_task.py "$REPO"

          git add .agent/ACTIVE_TASK.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "[Bot] docs: GitHub Issues 현황 자동 동기화"
          git push origin "$BRANCH" --force-with-lease

          EXISTING_PR=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create --repo "$REPO" --base develop --head "$BRANCH" \
              --title "[Bot] docs: GitHub Issues 현황 자동 동기화" \
              --body "Issue #86 Phase 2 자동 동기화 — GH_ISSUES_SYNC 섹션만 변경. Aiden 검토 후 수동 병합 바랍니다(자동 병합 없음)."
            echo "New PR created."
          else
            echo "Updated existing PR #$EXISTING_PR."
          fi
