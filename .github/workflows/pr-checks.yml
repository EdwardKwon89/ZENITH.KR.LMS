name: PR Checks

on:
  pull_request:
    branches: [develop, main]

jobs:
  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Apply migrations & seed
        run: supabase db reset --no-confirm

      - name: Create .env.local for tests
        run: |
          ANON_KEY=$(supabase status | grep 'anon key' | awk '{print $NF}')
          SERVICE_KEY=$(supabase status | grep 'service_role key' | awk '{print $NF}')
          cat > .env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SERVICE_KEY}
          EOF

      - run: npm ci

      - run: npm run build

      - run: npm run test:regression
